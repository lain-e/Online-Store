<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Development Portfolio & Process Showcase</title>
  <style>
    /* Base resets and variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg-slate-950: #020617;
      --bg-slate-900: #0f172a;
      --border-slate-900: #0f172a;
      --border-slate-800: #1e293b;
      --text-slate-100: #f8fafc;
      --text-slate-300: #cbd5e1;
      --text-slate-400: #94a3b8;
      --text-slate-500: #64748b;
      --text-slate-600: #475569;
      --teal-400: #2dd4bf;
      --teal-500: #14b8a6;
    }
    body {
      background-color: var(--bg-slate-950);
      color: var(--text-slate-100);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      overflow-hidden: hidden;
      position: relative;
    }
    ::selection {
      background-color: var(--teal-500);
      color: var(--bg-slate-950);
    }

    /* Ambient background glows */
    .glow-1 {
      position: absolute;
      top: 0; left: 0; width: 24rem; height: 24rem;
      background-color: rgba(99, 102, 241, 0.05);
      border-radius: 50%; filter: blur(64px); pointer-events: none;
    }
    .glow-2 {
      position: absolute;
      bottom: 0; right: 0; width: 24rem; height: 24rem;
      background-color: rgba(20, 184, 166, 0.05);
      border-radius: 50%; filter: blur(64px); pointer-events: none;
    }

    /* Layout structural rules */
    #sidebar {
      position: relative;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-slate-900);
      background-color: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(12px);
      width: 380px;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }
    #sidebar.collapsed {
      width: 72px !important;
    }
    #main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }

    /* Toggle and Resizer UI */
    .toggle-btn {
      position: absolute;
      right: -14px; top: 50%; transform: translateY(-50%);
      background-color: var(--bg-slate-900);
      border: 1px solid var(--border-slate-800);
      border-radius: 50%; p: 4px; padding: 4px;
      color: var(--text-slate-400); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 30;
    }
    .toggle-btn:hover { color: var(--teal-400); background-color: #1e293b; }
    
    .resizer {
      position: absolute; top: 0; bottom: 0; right: 0; width: 6px;
      cursor: col-resize; z-index: 20; transition: background-color 0.2s;
    }
    .resizer:hover { background-color: rgba(20, 184, 166, 0.4); }
    .resizer.resizing { background-color: rgba(20, 184, 166, 0.6); }
    #sidebar.collapsed .resizer { display: none; }

    /* Component Architecture elements */
    .header-bar {
      padding: 1.5rem; border-bottom: 1px solid rgba(15, 23, 42, 0.8);
      display: flex; align-items: center; gap: 0.75rem; height: 80px; flex-shrink: 0;
    }
    .header-title {
      font-family: monospace; font-size: 0.75rem; font-weight: 900;
      letter-spacing: 0.05em; color: var(--text-slate-300); text-transform: uppercase;
    }
    .tree-view { flex-grow: 1; overflow-y: auto; padding: 1rem; }
    
    /* Directory Tree Buttons styling */
    .folder-row {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 0.625rem; border-radius: 0.75rem; border: 1px solid transparent;
      background: transparent; color: var(--text-slate-400); font-family: monospace;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; text-align: left; margin-bottom: 0.25rem;
    }
    .folder-row:hover { background-color: rgba(15, 23, 42, 0.3); color: var(--text-slate-200); }
    .folder-row.active {
      background-color: rgba(15, 23, 42, 0.8); border-color: var(--border-slate-800); color: var(--teal-400); font-weight: bold;
    }
    .project-list {
      padding-left: 1rem; margin-left: 0.5rem; border-left: 1px solid rgba(15, 23, 42, 0.8);
      display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.5rem;
    }
    .project-btn {
      width: 100%; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.75rem;
      border-radius: 0.5rem; background: transparent; border: 1px solid transparent;
      color: var(--text-slate-400); cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    }
    .project-btn:hover { background-color: rgba(15, 23, 42, 0.2); color: var(--text-slate-200); }
    .project-btn.active {
      background-color: rgba(20, 184, 166, 0.1); border-color: rgba(20, 184, 166, 0.2); color: #5eead4; font-weight: 500;
    }

    /* Collapse items behavior */
    #sidebar.collapsed .header-title,
    #sidebar.collapsed .folder-row span,
    #sidebar.collapsed .folder-chevron,
    #sidebar.collapsed .project-list,
    #sidebar.collapsed .sidebar-footer { display: none; }
    #sidebar.collapsed .folder-badge { display: none; }
    #sidebar.collapsed .folder-row { justify-content: center; padding: 0.75rem; border-radius: 0.75rem; margin-bottom: 1.5rem;}
    #sidebar.collapsed .folder-row.active { background-color: rgba(20, 184, 166, 0.1); border-color: rgba(20, 184, 166, 0.4); }

    /* Utilities & Icons */
    .pulse-dot { width: 6px; height: 6px; background-color: var(--teal-400); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    .pulse-dot-large { width: 8px; height: 8px; background-color: var(--teal-500); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.1); } }
    .icon { width: 16px; height: 16px; vertical-align: middle; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-lg { width: 20px; height: 20px; }
    .flex-center { display: flex; align-items: center; gap: 0.5rem; }

    /* Feed Architecture elements */
    .feed-container { flex-grow: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 2.5rem; }
    .card { background-color: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-slate-900); border-radius: 1.5rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--bg-slate-950); padding-bottom: 1rem; gap: 0.5rem; }
    .pipeline-badge { font-family: monospace; font-size: 10px; color: var(--teal-400); background-color: rgba(20, 184, 166, 0.1); padding: 0.25rem 0.625rem; border-radius: 0.25rem; border: 1px solid rgba(20, 184, 166, 0.2); display: inline-flex; align-items: center; gap: 0.25rem; }
    
    /* Cycle Control Tools */
    .controls-wrapper { display: flex; align-items: center; background-color: rgba(2, 6, 23, 0.8); border: 1px solid var(--border-slate-900); border-radius: 0.75rem; padding: 0.375rem 0.625rem; gap: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .control-btn { padding: 4px; border-radius: 4px; background-color: var(--bg-slate-900); border: 1px solid var(--border-slate-800); color: var(--text-slate-400); cursor: pointer; display: flex; }
    .control-btn:hover { color: #fff; border-color: var(--text-slate-500); }

    /* Vector Render Matrices */
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .step-box { background-color: var(--bg-slate-950); border-radius: 0.75rem; padding: 0.75rem; border: 1px solid var(--border-slate-900); display: flex; flex-direction: column; gap: 0.625rem; }
    .render-canvas { aspect-ratio: 16 / 10; width: 100%; display: flex; align-items: center; justify-content: center; cursor: zoom-in; position: relative; border-radius: 0.5rem; overflow: hidden; }
    .render-canvas svg { width: 100%; height: 100%; object-fit: contain; }
    .canvas-overlay { position: absolute; inset: 0; background-color: rgba(2, 6, 23, 0.4); opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
    .render-canvas:hover .canvas-overlay { opacity: 1; }
    .overlay-tag { background-color: rgba(15, 23, 42, 0.9); border: 1px solid var(--border-slate-800); font-family: monospace; font-size: 10px; padding: 0.375rem 0.75rem; border-radius: 0.5rem; display: flex; align-items: center; gap: 0.25rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    .caption-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 11px; color: var(--text-slate-400); border-top: 1px solid rgba(15, 23, 42, 0.6); pt: 0.5rem; padding-top: 0.5rem; }

    /* Lightbox Modal System */
    #lightbox { position: fixed; inset: 0; background-color: rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; z-index: 50; cursor: zoom-out; }
    .modal-frame { width: 100%; max-width: 1024px; background-color: var(--bg-slate-900); border: 1px solid rgba(30, 41, 59, 0.8); border-radius: 1.5rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; position: relative; cursor: default; }
    .close-modal { position: absolute; top: 1rem; right: 1rem; background-color: #1e293b; border: 1px solid rgba(116, 143, 184, 0.2); color: var(--text-slate-300); p: 0.5rem; padding: 0.5rem; border-radius: 50%; cursor: pointer; display: flex; }
    .close-modal:hover { color: white; background-color: #334155; }
    .modal-stage-render { flex-grow: 1; min-height: 300px; display: flex; align-items: center; justify-content: center; background-color: var(--bg-slate-950); border-radius: 1rem; padding: 1rem; border: 1px solid var(--bg-slate-950); }
    .modal-stage-render svg { max-width: 100%; max-height: 450px; }

    .sidebar-footer { padding: 1.25rem; border-top: 1px solid var(--border-slate-900); flex-shrink: 0; background-color: rgba(2, 6, 23, 0.2); font-family: monospace; font-size: 10px; color: var(--text-slate-500); text-transform: uppercase; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-slate-800); border-radius: 9999px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-slate-600); }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <aside id="sidebar">

    </div>

    <div class="feed-container custom-scrollbar" id="gallery-feed">
      </div>
  </main>

      <div style="border-bottom: 1px solid var(--border-slate-800); padding-bottom: 0.75rem; padding-right: 2.5rem;">
        <span id="modal-project-title" style="font-family: monospace; font-size: 10px; color: var(--teal-400); text-transform: uppercase; letter-spacing: 0.05em;">PROJECT</span>
        <h4 id="modal-stage-title" style="font-size: 1rem; font-weight: bold; color: #fff; margin-top: 0.125rem;">Stage</h4>
      </div>
      <div class="modal-stage-render" id="modal-render-target">
        </div>
      <div style="display: flex; justify-content: space-between; font-family: monospace; font-size: 12px; color: var(--text-slate-500); padding-top: 0.25rem;">
        <span>Pipeline Preview Comp</span>
        <span>Click outside or press Esc to exit</span>

    </div>
  </div>

    // State Monitoring Variables

    const directoryIndicator = document.getElementById('directory-indicator');
    const assetCounter = document.getElementById('asset-counter');
    const galleryFeed = document.getElementById('gallery-feed');

    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    
    const lightbox = document.getElementById('lightbox');
    const closeLightboxBtn = document.getElementById('close-lightbox');
    const modalProjectTitle = document.getElementById('modal-project-title');
    const modalStageTitle = document.getElementById('modal-stage-title');
    const modalRenderTarget = document.getElementById('modal-render-target');

    // Sidebar Directory Resizer Engine
    let isResizing = false;
    sidebarResizer.addEventListener('mousedown', (e) => {
      e.preventDefault();
      isResizing = true;
      sidebarResizer.classList.add('resizing');
    });

    window.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 260 && newWidth < 600) {
        sidebar.style.width = `${newWidth}px`;
      }
    });

    window.addEventListener('mouseup', () => {
      isResizing = false;
      sidebarResizer.classList.remove('resizing');
    });

    // Touch Support for Resizing
    sidebarResizer.addEventListener('touchstart', () => { isResizing = true; });
    window.addEventListener('touchmove', (e) => {
      if (!isResizing) return;
      const newWidth = e.touches[0].clientX;
      if (newWidth > 260 && newWidth < 600) sidebar.style.width = `${newWidth}px`;
    });
    window.addEventListener('touchend', () => { isResizing = false; });

    // Collapse / Expand Toggle
    toggleSidebarBtn.addEventListener('click', () => {
      isLeftCollapsed = !isLeftCollapsed;
      if (isLeftCollapsed) {
        sidebar.classList.add('collapsed');
        toggleIcon.innerHTML = '<path d="m9 18 6-6-6-6"/>'; // ChevronRight
        toggleSidebarBtn.title = "Expand Directory";
      } else {
        sidebar.classList.remove('collapsed');
        toggleIcon.innerHTML = '<path d="m15 18-6-6 6-6"/>'; // ChevronLeft
        toggleSidebarBtn.title = "Collapse Directory";
      }
      renderTree();
    });

    // Event Controllers
    function handleCategoryClick(cat) {
      selectedCategory = cat;
      activeProjectIndex = 0;
      expandedCategories[cat] = !expandedCategories[cat];
      updateUI();
    }

    function handleProjectSelect(cat, index) {
      selectedCategory = cat;
      activeProjectIndex = index;
      updateUI();
    }

    prevBtn.addEventListener('click', () => {
      const projects = VISDEV_DB[selectedCategory] || [];
      if (projects.length === 0) return;
      activeProjectIndex = (activeProjectIndex === 0) ? projects.length - 1 : activeProjectIndex - 1;
      updateUI();
    });

    nextBtn.addEventListener('click', () => {
      const projects = VISDEV_DB[selectedCategory] || [];
      if (projects.length === 0) return;
      activeProjectIndex = (activeProjectIndex === projects.length - 1) ? 0 : activeProjectIndex + 1;
      updateUI();
    });

    // Dynamic Engine Render Functions
    function renderTree() {
      treeContainer.innerHTML = '';
      
      categories.forEach(cat => {
        const isFolderExpanded = expandedCategories[cat];
        const isActiveCategory = selectedCategory === cat;
        const folderProjects = VISDEV_DB[cat] || [];
        
        const folderRow = document.createElement('button');
        folderRow.className = `folder-row ${isActiveCategory ? 'active' : ''}`;
        
        // Dynamic construction of inside items to save overhead on dependencies
        const folderIcon = isFolderExpanded 
          ? `<svg class="icon" style="color: var(--teal-400);"><path d="M6 14h12M4 18h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2Z"/></svg>`
          : `<svg class="icon"><path d="M4 18h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2Z"/></svg>`;
        
        folderRow.innerHTML = `
          <div class="flex-center" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
            ${folderIcon}
            <span>${cat}</span>
          </div>
          <div class="flex-center folder-chevron">
            <span class="folder-badge" style="font-size: 10px; color: var(--text-slate-500); background-color: var(--bg-slate-950); padding: 2px 6px; border-radius: 4px;">${folderProjects.length}</span>
            <svg class="icon" style="width:14px; height:14px; transition: transform 0.2s; ${isFolderExpanded ? 'transform: rotate(180deg);' : ''}"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        `;
        
        folderRow.addEventListener('click', () => {
          if (isLeftCollapsed) {
            isLeftCollapsed = false;
            sidebar.classList.remove('collapsed');
            toggleIcon.innerHTML = '<path d="m15 18-6-6 6-6"/>';
          }
          handleCategoryClick(cat);
        });
        
        treeContainer.appendChild(folderRow);
        
        // Handle child element items expansion logic
        if (isFolderExpanded && !isLeftCollapsed) {
          const listContainer = document.createElement('div');
          listContainer.className = 'project-list';
          
          folderProjects.forEach((project, index) => {
            const isProjectActive = isActiveCategory && activeProjectIndex === index;
            const projBtn = document.createElement('button');
            projBtn.className = `project-btn ${isProjectActive ? 'active' : ''}`;
            
            projBtn.innerHTML = `
              <div class="flex-center" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                <svg class="icon" style="${isProjectActive ? 'color: var(--teal-400);' : 'color: var(--text-slate-600);'}"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4M10 9H8M16 13H8M16 17H8"/></svg>
                <span>${project.title}</span>
              </div>
              ${isProjectActive ? '<span class="pulse-dot"></span>' : ''}
            `;
            
            projBtn.addEventListener('click', () => handleProjectSelect(cat, index));
            listContainer.appendChild(projBtn);
          });
          
          treeContainer.appendChild(listContainer);
        }
      });
    }

    function renderActiveProject() {
      const activeCategoryProjects = VISDEV_DB[selectedCategory] || [];
      const currentProject = activeCategoryProjects[activeProjectIndex];
      
      directoryIndicator.innerText = `${selectedCategory} directory`;
      contextFooterNote.innerText = `Context: ${selectedCategory}`;
      
      if (activeCategoryProjects.length > 0) {
        assetCounter.innerHTML = `Asset <span style="color: var(--teal-400); font-weight: bold;">${activeProjectIndex + 1}</span> of ${activeCategoryProjects.length}`;
      }
      
      if (!currentProject) {
        galleryFeed.innerHTML = `<div style="text-align: center; padding: 5rem 0; color: var(--text-slate-500); font-size: 0.875rem;">No project selected.</div>`;
        return;
      }
      
      // Structural construction of pipeline project display card
      let stepsHTML = '';
      currentProject.steps.forEach((step, idx) => {
        const nextPrompt = (idx < currentProject.steps.length - 1) 
          ? `<span style="color: var(--text-slate-600); display: inline-flex; align-items: center; gap: 2px;">Next <svg class="icon" style="width:12px; height:12px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>` 
          : '';
          
        stepsHTML += `
          <div class="step-box">
            <div class="render-canvas" data-project="${currentProject.title}" data-stage="${step.stage}">
              ${step.render}
              <div class="canvas-overlay">
                <span class="overlay-tag">
                  <svg class="icon" style="color: var(--teal-400);"><path d="m15 3 6 6-9 9-4 1 1-4Z"/><path d="M11 7 8 4M17 13l3 3M19 9l-2-2M13 15l-2-2"/></svg>
                  <span>Full View</span>
                </span>
              </div>
            </div>
            <div class="caption-row">
              <span style="font-weight: 600; color: var(--text-slate-300);">${step.stage}</span>
              ${nextPrompt}
            </div>
          </div>
        `;
      });
      
      galleryFeed.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div>
              <h3 style="font-size: 1.125rem; font-weight: 900; color: #fff;">${currentProject.title}</h3>
              <p style="text-size: 0.75rem; color: var(--text-slate-400); margin-top: 0.25rem; line-height: 1.6;">${currentProject.description}</p>
            </div>
            <span class="pipeline-badge">
              <svg class="icon" style="width:14px; height:14px;"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              <span>PIPELINE FEED</span>
            </span>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <span style="font-family: monospace; font-size: 10px; color: var(--text-slate-500); text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 4px;">
              <svg class="icon" style="color: var(--teal-400); width:14px; height:14px;"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
              <span>Progress Screenshots (Click to Expand)</span>
            </span>
            <div class="grid-layout">
              ${stepsHTML}
            </div>
          </div>
        </div>
      `;
      
      // Attach single item zoom triggers
      document.querySelectorAll('.render-canvas').forEach(canvas => {
        canvas.addEventListener('click', function() {
          const projectTitle = this.getAttribute('data-project');
          const stageTitle = this.getAttribute('data-stage');
          const svgContent = this.querySelector('svg').outerHTML;
          openLightbox(projectTitle, stageTitle, svgContent);
        });
      });
    }

    function updateUI() {
      renderTree();
      renderActiveProject();
    }

    // Modal Manager functions
    function openLightbox(project, stage, svgRaw) {
      modalProjectTitle.innerText = project;
      modalStageTitle.innerText = stage;
      modalRenderTarget.innerHTML = svgRaw;
      lightbox.style.display = 'flex';
    }

    function closeLightbox() {
      lightbox.style.display = 'none';
      modalRenderTarget.innerHTML = '';
    }

    closeLightboxBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', closeLightbox);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Boot Initialization Call
    updateUI();
  </script>
</body>
</html>
