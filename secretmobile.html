<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2721d7">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Laine Neufeld Art — Mobile Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --page-bg: #2721d7;
            --passcode-screen-bg: #2721d7;
            --passcode-frame-border: #F5EDE6;
            --passcode-text: #F5EDE6;
            --passcode-header-divider: #4b2ffb;
            --passcode-prompt: #7b8cde;
            --passcode-cursor: #7b8cde;
            --explorer-frame-border: #e8e4dc;
            --explorer-text: #e8e4dc;
            --explorer-divider: #e8e4dc;
            --hollow-box-bg: transparent;
            --hollow-box-border: #e8e4dc;
            --hollow-box-border-thin: #e8e4dc;
            --hollow-box-text: #e8e4dc;
            --label-border: #e8e4dc;
            --label-text: #e8e4dc;
            --button-bg: #45416b;
            --button-bg-hover: #4f4b75;
            --button-text: #e8e4dc;
            --sidebar-active-bg: #f7ff68;
            --sidebar-active-text: #1e1b38;
            --menu-active-bg: rgba(232, 228, 220, 0.15);
            --filmstrip-cell-bg: #e8e4dc;
            --filmstrip-cell-text: #2721d7;
            --filmstrip-label-bg: #e8e4dc;
            --filmstrip-label-text: #2721d7;
            --filmstrip-active-ring: #f7ff68;
            --viewer-canvas-bg: #8c8c8c;
            --file-details-bg: #e8e4dc;
            --file-details-text: #2721d7;
            --explorer-titlebar-bg: #f7ff68;
            --explorer-titlebar-text: #000000;
            --status-text: #e8e4dc;
            --lightbox-overlay-bg: rgba(30, 27, 56, 0.95);
            --font-main: "Space Mono", monospace, "Courier New", Courier;
        }

        html.display-warm {
            --page-bg: #2a2018;
            --passcode-screen-bg: #2a2018;
            --passcode-frame-border: #d4c4a8;
            --passcode-text: #d4c4a8;
            --passcode-prompt: #b8a078;
            --explorer-frame-border: #c9b896;
            --explorer-text: #d4c4a8;
            --explorer-divider: #c9b896;
            --hollow-box-border: #c9b896;
            --hollow-box-border-thin: #c9b896;
            --hollow-box-text: #d4c4a8;
            --label-border: #c9b896;
            --label-text: #d4c4a8;
            --button-bg: #4a3d32;
            --button-text: #e8dcc8;
            --sidebar-active-bg: #c9a86a;
            --sidebar-active-text: #1e1b38;
            --filmstrip-cell-bg: #d4c4a8;
            --filmstrip-cell-text: #2a2018;
            --filmstrip-label-bg: #d4c4a8;
            --filmstrip-label-text: #2a2018;
            --file-details-bg: #d4c4a8;
            --file-details-text: #2a2018;
        }

        html.display-bw {
            --page-bg: #121212;
            --passcode-screen-bg: #121212;
            --passcode-frame-border: #e0e0e0;
            --passcode-text: #e0e0e0;
            --passcode-prompt: #b0b0b0;
            --explorer-frame-border: #cccccc;
            --explorer-text: #e0e0e0;
            --explorer-divider: #cccccc;
            --hollow-box-border: #cccccc;
            --hollow-box-border-thin: #cccccc;
            --hollow-box-text: #e0e0e0;
            --label-border: #cccccc;
            --label-text: #e0e0e0;
            --button-bg: #333333;
            --button-text: #f0f0f0;
            --sidebar-active-bg: #ffffff;
            --sidebar-active-text: #000000;
            --filmstrip-cell-bg: #e0e0e0;
            --filmstrip-cell-text: #121212;
            --filmstrip-label-bg: #e0e0e0;
            --filmstrip-label-text: #121212;
            --file-details-bg: #e0e0e0;
            --file-details-text: #121212;
            --filmstrip-active-ring: #ffffff;
        }

        html.display-bw #mobile-app img,
        html.display-bw #lightbox img {
            filter: grayscale(100%);
        }

        html.display-invert {
            --page-bg: #e8e4dc;
            --passcode-screen-bg: #e8e4dc;
            --passcode-frame-border: #2721d7;
            --passcode-text: #2721d7;
            --passcode-prompt: #45416b;
            --passcode-cursor: #2721d7;
            --explorer-frame-border: #2721d7;
            --explorer-text: #2721d7;
            --explorer-divider: #2721d7;
            --hollow-box-border: #2721d7;
            --hollow-box-border-thin: #2721d7;
            --hollow-box-text: #2721d7;
            --label-border: #2721d7;
            --label-text: #2721d7;
            --button-bg: #d4d0c8;
            --button-text: #2721d7;
            --sidebar-active-bg: #2721d7;
            --sidebar-active-text: #e8e4dc;
            --filmstrip-cell-bg: #2721d7;
            --filmstrip-cell-text: #e8e4dc;
            --filmstrip-label-bg: #2721d7;
            --filmstrip-label-text: #e8e4dc;
            --file-details-bg: #2721d7;
            --file-details-text: #e8e4dc;
            --explorer-titlebar-bg: #2721d7;
            --explorer-titlebar-text: #f7ff68;
            --status-text: #2721d7;
            --lightbox-overlay-bg: rgba(232, 228, 220, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--page-bg);
            color: var(--explorer-text);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .hollow-box {
            background: var(--hollow-box-bg);
            border: 2px solid var(--hollow-box-border);
            color: var(--hollow-box-text);
        }
        .hollow-box-thin {
            background: var(--hollow-box-bg);
            border: 1px solid var(--hollow-box-border-thin);
            color: var(--hollow-box-text);
        }
        .hollow-divider { border-color: var(--explorer-divider); }
        .label-chip {
            background: transparent;
            border: 1px solid var(--label-border);
            color: var(--label-text);
        }
        .win-button {
            background: var(--button-bg);
            color: var(--button-text);
            border: 1px solid var(--explorer-divider);
            min-height: 44px;
            touch-action: manipulation;
        }
        .win-button:active { opacity: 0.85; }
        .nav-accent-btn {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
            border: 1px solid var(--sidebar-active-bg);
        }
        .file-details-box {
            background: var(--file-details-bg);
            color: var(--file-details-text);
        }
        .menu-item.active {
            background: var(--menu-active-bg);
        }
        .cat-tab.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
            border-color: var(--sidebar-active-bg);
        }

        #terminal-gate {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--passcode-screen-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        #terminal-gate.authorized {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none !important;
            visibility: hidden;
        }

        #terminal-gate.authorized,
        #terminal-gate.authorized * {
            pointer-events: none !important;
        }
        .console-cursor {
            display: inline-block;
            width: 10px;
            height: 1em;
            background: var(--passcode-cursor);
            animation: blink 1s steps(2, start) infinite;
            vertical-align: middle;
            margin-left: 4px;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .gate-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 28rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            pointer-events: auto;
        }

        .gate-nav-link {
            position: relative;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0.5rem 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 0.8125rem;
            letter-spacing: 0.06em;
            border: 2px solid var(--passcode-frame-border);
            color: var(--passcode-text);
            background: var(--passcode-screen-bg);
            pointer-events: auto !important;
            cursor: pointer !important;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.25);
        }

        .gate-nav-link:active {
            opacity: 0.85;
        }

        #terminal-prompt-zone {
            position: relative;
            min-height: 2.75rem;
        }

        #terminal-hidden-input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: text;
            z-index: 1;
        }

        #mobile-app {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--explorer-frame-border);
            max-width: 640px;
            margin: 0 auto;
        }
        #mobile-app.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #mobile-header {
            background: var(--explorer-titlebar-bg);
            color: var(--explorer-titlebar-text);
            flex-shrink: 0;
        }

        #main-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        #bottom-nav {
            flex-shrink: 0;
            border-top: 1px solid var(--explorer-divider);
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: var(--page-bg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .viewer-canvas {
            background: var(--viewer-canvas-bg);
            width: 100%;
            padding: 0 !important;
            overflow: hidden;
        }
        .viewer-canvas-frame {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .viewer-canvas-frame img,
        .viewer-canvas-frame .viewer-media-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            max-width: none;
            max-height: none;
        }
        .viewer-canvas-frame .media-rotate-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .viewer-canvas-frame .media-rotate-wrap.is-90 img,
        .viewer-canvas-frame .media-rotate-wrap.is-neg-90 img {
            width: 100%;
            height: 100%;
            max-height: none;
            object-fit: cover;
        }

        .filmstrip-track {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 8px;
        }
        .filmstrip-thumb {
            flex: 0 0 88px;
            height: 66px;
            scroll-snap-align: start;
            position: relative;
            background: var(--filmstrip-cell-bg);
            overflow: hidden;
        }
        .filmstrip-thumb.filmstrip-active {
            outline: 3px solid var(--filmstrip-active-ring);
            outline-offset: 1px;
        }
        .filmstrip-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
        }
        .filmstrip-thumb.filmstrip-active img { opacity: 1; }
        .filmstrip-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 8px;
            font-weight: 700;
            text-align: center;
            background: var(--filmstrip-label-bg);
            color: var(--filmstrip-label-text);
            padding: 1px 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        .cat-tab {
            flex-shrink: 0;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--hollow-box-border-thin);
            touch-action: manipulation;
        }

        #project-select {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 12px;
            background: transparent;
            color: var(--explorer-text);
            border: 1px solid var(--hollow-box-border-thin);
            min-height: 44px;
        }

        .gallery-overview {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .gallery-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            opacity: 0.85;
        }
        .final-gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .final-gallery-card {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--hollow-box-border-thin);
            background: transparent;
            color: var(--explorer-text);
            padding: 0;
            text-align: left;
            touch-action: manipulation;
            overflow: hidden;
            min-height: 44px;
        }
        .final-gallery-card:active {
            opacity: 0.85;
        }
        .final-gallery-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            background: var(--viewer-canvas-bg);
        }
        .final-gallery-card-meta {
            padding: 6px 8px;
            border-top: 1px solid var(--hollow-box-border-thin);
        }
        .final-gallery-card-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1.3;
        }
        .final-gallery-card-tag {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 2px;
        }

        #display-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 4px;
            min-width: 10rem;
            z-index: 50;
            background: var(--page-bg);
        }
        #display-menu.is-open { display: block; }
        .display-option {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 700;
            background: transparent;
            color: var(--explorer-text);
            border: none;
            border-bottom: 1px solid var(--explorer-divider);
        }
        .display-option.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
        }

        .menu-scroll {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 6px 8px;
            font-size: 12px;
            border-bottom: 1px solid var(--explorer-divider);
        }
        .menu-item {
            flex-shrink: 0;
            padding: 6px 10px;
            touch-action: manipulation;
        }

        .media-rotate-wrap.is-90,
        .media-rotate-wrap.is-neg-90 {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .media-rotate-wrap.is-90 img { transform: rotate(90deg); max-height: 70vw; }
        .media-rotate-wrap.is-neg-90 img { transform: rotate(-90deg); max-height: 70vw; }

        #lightbox {
            touch-action: none;
        }
        #lightbox-image-stage {
            touch-action: none;
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }
        #modal-render-target {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: none;
            max-height: none;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <!-- Passcode gate -->
    <div id="terminal-gate">
        <div class="gate-content">
            <div class="gate-frame w-full p-6 sm:p-8 flex flex-col gap-4 relative" style="border: 4px solid var(--passcode-frame-border); color: var(--passcode-text);">
                <div class="flex justify-between items-center text-lg border-b pb-3 font-bold uppercase tracking-widest select-none" style="border-color: var(--passcode-header-divider);">
                    <span>LAINE NEUFELD ART</span>
                    <span>★</span>
                </div>
                <div id="terminal-display" class="text-sm flex flex-col gap-2 font-mono leading-relaxed select-none" style="color: var(--passcode-text);">
                    <p>Visual Development + Illustration</p>
                    <p>Private Portfolio — Mobile</p>
                    <div class="border-t my-1" style="border-color: color-mix(in srgb, var(--passcode-text) 20%, transparent);"></div>
                    <p class="text-center font-extrabold">WIZARDS ONLY, FOOLS</p>
                </div>
                <div id="terminal-prompt-zone" class="flex items-center gap-1 border-t pt-4 font-mono text-base" style="border-color: color-mix(in srgb, var(--passcode-prompt) 30%, transparent);">
                    <input type="password" id="terminal-hidden-input" maxlength="20" autofocus autocomplete="off" tabindex="0" aria-label="Enter passcode" />
                    <span class="font-bold pointer-events-none" style="color: var(--passcode-prompt);">C:\></span>
                    <span id="terminal-echo-text" class="font-bold tracking-widest pointer-events-none"></span>
                    <span class="console-cursor pointer-events-none"></span>
                </div>
                <div class="text-center text-sm select-none pointer-events-none" style="color: var(--passcode-prompt);">[ENTER PASSCODE]</div>
            </div>

            <a href="secret.html" id="gate-desktop-link" class="gate-nav-link">View desktop version</a>
        </div>
    </div>

    <!-- Mobile app -->
    <div id="mobile-app" class="w-full">
        <header id="mobile-header" class="px-3 py-2 flex justify-between items-center gap-2 font-bold text-sm">
            <span class="truncate">Laine Neufeld Art — Mobile</span>
            <div class="relative shrink-0">
                <button id="display-btn" type="button" class="px-2 py-1 text-xs border border-black font-bold min-h-[36px]">Display</button>
                <div id="display-menu" class="hollow-box" role="menu">
                    <button type="button" class="display-option active" data-display="default">Default</button>
                    <button type="button" class="display-option" data-display="warm">Low Contrast Warm</button>
                    <button type="button" class="display-option" data-display="bw">Black &amp; White</button>
                    <button type="button" class="display-option" data-display="invert">Invert</button>
                </div>
            </div>
        </header>

        <nav class="menu-scroll" style="color: var(--explorer-text);">
            <a id="menu-public-site" class="menu-item no-underline" href="/" style="color: inherit;">Public Site</a>
                     <button type="button" id="menu-portfolio" class="menu-item">Project View</button>
     <button type="button" id="menu-gallery" class="menu-item active">Gallery View</button>
            <button type="button" id="menu-about" class="menu-item">About</button>
            <button type="button" id="menu-professional" class="menu-item">Professional</button>
            <button type="button" id="menu-contact" class="menu-item">Contact</button>
          
    
        </nav>

        <div id="browse-bar" class="px-3 py-2 space-y-2 border-b hollow-divider">
            <div class="cat-tabs" id="cat-tabs" role="tablist"></div>
            <select id="project-select" aria-label="Select project"></select>
        </div>

        <main id="main-scroll">
            <div id="gallery-feed"></div>
        </main>

        <div id="bottom-nav">
            <button id="prev-btn" type="button" class="nav-accent-btn win-button font-bold uppercase text-sm">&lt;&lt; Prev</button>
            <button id="next-btn" type="button" class="nav-accent-btn win-button font-bold uppercase text-sm">Next &gt;&gt;</button>
        </div>

        <div id="status-bar" class="px-3 py-1 text-[10px] border-t hollow-divider truncate" style="color: var(--status-text);">
            Ready
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[100] hidden flex-col p-2" style="background: var(--lightbox-overlay-bg);">
        <div class="hollow-box flex flex-col flex-1 min-h-0 w-full max-w-lg mx-auto">
            <div class="border-b hollow-divider px-2 py-2 flex justify-between items-center font-bold text-xs flex-shrink-0" style="color: var(--explorer-text);">
                <span class="truncate pr-2" id="modal-project-title">Project</span>
                <button id="close-lightbox" type="button" class="hollow-box-thin px-3 py-1 font-bold min-h-[44px]">X</button>
            </div>
            <div id="lightbox-image-stage">
                <img id="modal-render-target" src="" alt="" draggable="false" />
            </div>
            <div class="border-t hollow-divider p-2 flex items-center justify-between gap-2 text-xs flex-shrink-0" style="color: var(--explorer-text);">
                <span class="truncate" id="modal-filename">FINAL</span>
                <div class="flex gap-1 shrink-0">
                    <button id="zoom-out" type="button" class="win-button px-3 py-2 font-bold min-w-[44px]">−</button>
                    <span id="zoom-level" class="hollow-box-thin px-2 py-2 font-bold min-w-[3rem] text-center">100%</span>
                    <button id="zoom-in" type="button" class="win-button px-3 py-2 font-bold min-w-[44px]">+</button>
                </div>
            </div>
        </div>
    </div>

    <script src="visdev-data.js"></script>
    <script>
        let VISDEV_DB;
        let MENU_CONTENT;
        const categoriesList = ['backgrounds', 'props', 'concepts', 'vehicles', 'motionGraphics'];
        const categoryLabels = { backgrounds: 'Backgrounds', props: 'Props', concepts: 'Concepts', vehicles: 'Vehicles', motionGraphics: 'Motion Graphics' };

        let selectedCategory = 'backgrounds';
        let activeProjectIndex = 0;
        let activeMediaIndex = 0;
        let viewerMode = 'gallery';
        let activeDisplayMode = 'default';
        let pendingDeepLink = null;
        let passcodeAuthenticated = false;

        const _k = 'IjIzMjMi';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                try {
                    const saved = parseFloat(localStorage.getItem('portfolioSfxVolume'));
                    masterGain.gain.value = Number.isFinite(saved) ? Math.max(0, Math.min(1, saved)) : 1;
                } catch (e) { masterGain.gain.value = 1; }
            }
        }

        function playLoFiClick({ pitch = 860, volume = 0.09, decay = 0.04 } = {}) {
            initAudio();
            if (!audioCtx) return;
            const out = masterGain;
            const now = audioCtx.currentTime;
            const click = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            click.type = 'square';
            click.frequency.setValueAtTime(pitch, now);
            gain.gain.setValueAtTime(volume * 0.45, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
            click.connect(gain);
            gain.connect(out);
            click.start(now);
            click.stop(now + decay);
        }

        function playKeyBeep() { playLoFiClick({ pitch: 1040, volume: 0.065, decay: 0.032 }); }
        function playStickyKey() { playLoFiClick({ pitch: 940, volume: 0.1, decay: 0.042 }); }
        function playLoFiNav() { playLoFiClick({ pitch: 720, volume: 0.08, decay: 0.036 }); }

        function playBuzzer() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 90;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        function playEntryChime() {
            initAudio();
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + i * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.25);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(audioCtx.currentTime + i * 0.12);
                osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
            });
        }

        function getMediaRotate(media) {
            return media && media.rotate ? Number(media.rotate) : 0;

        function getMediaVisualDimensions(img, rotateDeg) {
            const swap = Math.abs(rotateDeg) === 90;
            return {
                width: swap ? img.naturalHeight : img.naturalWidth,
                height: swap ? img.naturalWidth : img.naturalHeight
            };
        }

        const projectViewportCache = new Map();
        const VIEWER_MAX_HEIGHT_RATIO = 0.5;
        const VIEWER_MIN_HEIGHT = 160;

        function measureProjectViewport(project) {
            return new Promise((resolve) => {
                if (!project?.id) {
                    resolve({ width: 4, height: 3, aspectRatio: 4 / 3 });
                    return;
                }
                const cached = projectViewportCache.get(project.id);
                if (cached) {
                    resolve(cached);
                    return;
                }
                const finalMedia = getProjectFinalMedia(project);
                if (!finalMedia?.url) {
                    const fallback = { width: 4, height: 3, aspectRatio: 4 / 3 };
                    projectViewportCache.set(project.id, fallback);
                    resolve(fallback);
                    return;
                }
                const img = new Image();
                const rotate = getMediaRotate(finalMedia);
                img.onload = () => {
                    const dims = getMediaVisualDimensions(img, rotate);
                    const viewport = {
                        width: dims.width,
                        height: dims.height,
                        aspectRatio: dims.width / Math.max(dims.height, 1)
                    };
                    projectViewportCache.set(project.id, viewport);
                    resolve(viewport);
                };
                img.onerror = () => {
                    const fallback = { width: 4, height: 3, aspectRatio: 4 / 3 };
                    projectViewportCache.set(project.id, fallback);
                    resolve(fallback);
                };
                img.src = finalMedia.url;
            });
        }

        function computeViewerCanvasHeight(aspectRatio) {
            const feed = document.getElementById('gallery-feed');
            const availableWidth = feed?.clientWidth || Math.min(window.innerWidth - 24, 640);
            const maxHeight = window.innerHeight * VIEWER_MAX_HEIGHT_RATIO;
            let height = availableWidth / Math.max(aspectRatio, 0.1);
            if (height > maxHeight) height = maxHeight;
            return Math.max(Math.round(height), VIEWER_MIN_HEIGHT);
        }

        function applyViewerCanvasSizing(project) {

                canvas.style.height = `${computeViewerCanvasHeight(viewport.aspectRatio)}px`;
            });
        }

        const lightbox = document.getElementById('lightbox');

        const lightboxImageStage = document.getElementById('lightbox-image-stage');
        let lightboxZoom = 1;
        let lightboxPanX = 0;
        let lightboxPanY = 0;
        let lightboxBaseWidth = 0;
        let lightboxBaseHeight = 0;
        let lightboxImageRotate = 0;
        let isLightboxDragging = false;
        let lastPinchDistance = null;
        const MIN_ZOOM = 0.5;

        const ZOOM_STEP = 0.25;

        function applyLightboxTransform() {
            const rot = lightboxImageRotate ? ` rotate(${lightboxImageRotate}deg)` : '';
            modalRenderTarget.style.transform = `translate(calc(-50% + ${lightboxPanX}px), calc(-50% + ${lightboxPanY}px))${rot} scale(${lightboxZoom})`;
            document.getElementById('zoom-level').textContent = `${Math.round(lightboxZoom * 100)}%`;

        function fitLightboxImage() {
            const rect = lightboxImageStage.getBoundingClientRect();
            const img = modalRenderTarget;
            if (!img.naturalWidth) return;
            const { width: vw, height: vh } = getMediaVisualDimensions(img, lightboxImageRotate);
            const scale = Math.min((rect.width - 16) / vw, (rect.height - 16) / vh, 1);
            lightboxBaseWidth = img.naturalWidth * scale;
            lightboxBaseHeight = img.naturalHeight * scale;
            img.style.width = `${lightboxBaseWidth}px`;
            img.style.height = `${lightboxBaseHeight}px`;
            lightboxZoom = 1;
            lightboxPanX = 0;
            lightboxPanY = 0;
            applyLightboxTransform();
        }

        function openLightbox(project) {
            const media = project.media[activeMediaIndex];
            lightboxImageRotate = getMediaRotate(media);
            document.getElementById('modal-project-title').textContent = project.title;
            document.getElementById('modal-filename').textContent = media.label;
            modalRenderTarget.onload = fitLightboxImage;
            modalRenderTarget.src = media.url;
            if (modalRenderTarget.complete) fitLightboxImage();
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            document.body.style.overflow = 'hidden';
            playLoFiNav();
        }

        function closeLightbox() {
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
            modalRenderTarget.src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('close-lightbox').addEventListener('click', closeLightbox);
        document.getElementById('zoom-in').addEventListener('click', () => {
            lightboxZoom = Math.min(MAX_ZOOM, lightboxZoom + ZOOM_STEP);
            applyLightboxTransform();
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            lightboxZoom = Math.max(MIN_ZOOM, lightboxZoom - ZOOM_STEP);
            applyLightboxTransform();
        });

        lightboxImageStage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const [a, b] = e.touches;
                lastPinchDistance = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
            } else if (e.touches.length === 1) {
                isLightboxDragging = true;
                lightboxImageStage._sx = e.touches[0].clientX;
                lightboxImageStage._sy = e.touches[0].clientY;
                lightboxImageStage._px = lightboxPanX;
                lightboxImageStage._py = lightboxPanY;
            }
        }, { passive: true });

        lightboxImageStage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && lastPinchDistance) {
                e.preventDefault();
                const [a, b] = e.touches;
                const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                lightboxZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, lightboxZoom * (d / lastPinchDistance)));
                lastPinchDistance = d;
                applyLightboxTransform();
            } else if (e.touches.length === 1 && isLightboxDragging) {
                e.preventDefault();
                lightboxPanX = lightboxImageStage._px + (e.touches[0].clientX - lightboxImageStage._sx);
                lightboxPanY = lightboxImageStage._py + (e.touches[0].clientY - lightboxImageStage._sy);
                applyLightboxTransform();
            }
        }, { passive: false });

        lightboxImageStage.addEventListener('touchend', () => {
            isLightboxDragging = false;
            lastPinchDistance = null;
        });

        document.body.addEventListener('click', () => initAudio(), { once: true });

        window.addEventListener('resize', () => {
            if (viewerMode !== 'project') return;
            const projects = VISDEV_DB[selectedCategory] || [];
            const currentProject = projects[activeProjectIndex];
            if (currentProject) applyViewerCanvasSizing(currentProject);
        });

        window.onload = () => terminalHiddenInput.focus();
    </script>
</body>
</html>
